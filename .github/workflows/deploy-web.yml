name: deploy-web

# Auto-deploys the web console to the VPS on every push to dev that touches
# the web app (or the deploy plumbing). Also runnable on demand. main is left
# frozen (no auto-deploy) — it's reserved for the hackathon announcement.
#
# Requires three repo secrets (Settings → Secrets and variables → Actions):
#   VPS_HOST     the server host/IP        (e.g. 103.150.190.91)
#   VPS_USER     ssh user                  (e.g. cuyvps)
#   VPS_SSH_KEY  a private key whose public half is in that user's
#                ~/.ssh/authorized_keys on the VPS
#
# The server-side steps (pull, isolated npm install, build, pm2 restart) live
# in scripts/deploy-web.sh so they stay identical between CI and hand runs.

on:
  push:
    branches: [dev]
    paths:
      - 'apps/web/**'
      - 'scripts/deploy-web.sh'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check deploy secrets
        id: gate
        run: |
          if [ -z "${{ secrets.VPS_HOST }}" ]; then
            echo "::warning::VPS_HOST not set — skipping deploy. Add VPS_HOST / VPS_USER / VPS_SSH_KEY repo secrets to enable auto-deploy."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      # Plain OpenSSH (not appleboy/ssh-action — its connection silently fetched
      # the wrong commit on this host). Runs the host's login shell, exactly like
      # a normal interactive SSH session, which fetches dev correctly. Deploys
      # ONLY on an exact commit match so a stale fetch can never revert live.
      - name: Deploy over SSH
        if: steps.gate.outputs.ready == 'true'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          SHA: ${{ github.sha }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 \
            "$VPS_USER@$VPS_HOST" \
            "set -e; cd ~/nebula && git fetch origin dev && git reset --hard FETCH_HEAD && test \"\$(git rev-parse HEAD)\" = \"$SHA\" && NEBULA_DEPLOY_REF=dev bash scripts/deploy-web.sh"
