name: release

# Tag-driven release GATE + GitHub-release creator. This workflow NEVER holds an
# npm token: publishing to the registry is done manually via
# `scripts/publish-npm.sh`, which prompts for an authenticator OTP per package
# (the secure 2FA path). CI only validates the tagged commit and cuts the GitHub
# release — so a leaked CI secret can never push to npm on its own.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Fail-fast: refuse to release unless the root package.json version matches
      # the git tag. Catches the "tagged before bumping version" race.
      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME}"
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          echo "tag=$TAG package.json=$PKG_VERSION"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG_VERSION."
            echo "::error::Bump root + workspace package.json versions BEFORE tagging."
            exit 1
          fi

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.7

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun test --timeout 60000 packages/*/src

      # Contracts are Rust/Odra; the pinned nightly comes from
      # contracts/rust-toolchain.toml (rustup installs it on first use).
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts

      - name: Contract tests (OdraVM)
        working-directory: contracts
        run: cargo test

      # Publishing to npm is intentionally MANUAL (scripts/publish-npm.sh, OTP 2FA
      # per package). CI never holds an npm token. Cut/refresh the GitHub release
      # for this tag — idempotent: skip if a release already exists (e.g. one cut
      # by hand with curated notes).
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --generate-notes --title "$TAG"
