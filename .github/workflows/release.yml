name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Fail-fast: refuse to publish unless package.json version matches the git
      # tag. Catches the "tagged before bumping version" race that otherwise
      # fails mid-pipeline with a 403 over an already-published version.
      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME}"
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          echo "tag=$TAG package.json=$PKG_VERSION"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG_VERSION."
            echo "::error::Bump root + workspace package.json versions BEFORE tagging."
            exit 1
          fi

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.7

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun test --timeout 60000 packages/*/src

      # contracts/lib is gitignored; fetch forge-std fresh. Direct clone (not
      # `forge install`) because foundry.toml uses libs = ["contracts/lib"], a
      # non-default path that `forge install` ignores. The registries are
      # self-contained Solidity, so no OpenZeppelin checkout is needed.
      - name: Install Forge libs
        run: |
          mkdir -p contracts/lib
          git clone --depth 1 --branch v1.16.0 \
            https://github.com/foundry-rs/forge-std contracts/lib/forge-std

      - name: Forge tests
        run: forge test

      # bun publish does not reliably honor ~/.npmrc on CI runners; it does
      # respect NPM_CONFIG_TOKEN. Set both as belt-and-suspenders.
      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      # Substitute workspace:* with the concrete version ourselves before bun
      # publish runs, so the tarball metadata is exactly what we shipped. All
      # sibling deps are named nebula-ai-*.
      - name: Pin workspace deps to concrete version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          echo "Pinning nebula-ai-* workspace:* deps to ${PKG_VERSION}"
          for f in packages/*/package.json; do
            node - "$f" "$PKG_VERSION" <<'NODEEOF'
          const fs = require('fs')
          const [path, version] = [process.argv[2], process.argv[3]]
          const pkg = JSON.parse(fs.readFileSync(path, 'utf8'))
          let changed = false
          for (const key of ['dependencies', 'peerDependencies', 'devDependencies']) {
            const deps = pkg[key]
            if (!deps || typeof deps !== 'object') continue
            for (const [name, value] of Object.entries(deps)) {
              if (name.startsWith('nebula-ai-') && typeof value === 'string' && value.startsWith('workspace:')) {
                deps[name] = version
                changed = true
              }
            }
          }
          if (changed) {
            fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n')
            console.log('  pinned ' + path)
          }
          NODEEOF
          done

      # Publish in topological order: core → plugins → gateway → cli.
      - name: Publish nebula-ai-core
        working-directory: packages/core
        env: { NPM_CONFIG_TOKEN: "${{ secrets.NPM_TOKEN }}" }
        run: bun publish --access=public

      - name: Publish nebula-ai-plugin-onchain
        working-directory: packages/plugin-onchain
        env: { NPM_CONFIG_TOKEN: "${{ secrets.NPM_TOKEN }}" }
        run: bun publish --access=public

      - name: Publish nebula-ai-plugin-system
        working-directory: packages/plugin-system
        env: { NPM_CONFIG_TOKEN: "${{ secrets.NPM_TOKEN }}" }
        run: bun publish --access=public

      - name: Publish nebula-ai-plugin-telegram
        working-directory: packages/plugin-telegram
        env: { NPM_CONFIG_TOKEN: "${{ secrets.NPM_TOKEN }}" }
        run: bun publish --access=public

      - name: Publish nebula-ai-gateway
        working-directory: packages/gateway
        env: { NPM_CONFIG_TOKEN: "${{ secrets.NPM_TOKEN }}" }
        run: bun publish --access=public

      - name: Publish nebula-treasury (cli)
        working-directory: packages/cli
        env: { NPM_CONFIG_TOKEN: "${{ secrets.NPM_TOKEN }}" }
        run: bun publish --access=public

      # Verify the registry has what we shipped, with the right sibling-dep
      # pins. Direct fetch bypasses npm view's cache; retry tolerates
      # propagation delay (typically <30s).
      - name: Verify published deps match version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          PACKAGES=$(jq -r '.name' packages/*/package.json | tr '\n' ' ')
          RESULTS_DIR=$(mktemp -d)
          for pkg in $PACKAGES; do
            (
              META=""
              for attempt in 1 2 3 4 5 6; do
                META=$(curl -sf "https://registry.npmjs.org/${pkg}/${PKG_VERSION}" 2>/dev/null || echo "")
                [ -n "$META" ] && break
                sleep 10
              done
              SAFE_NAME=$(echo "$pkg" | tr '/' '_')
              if [ -z "$META" ]; then
                echo "::error::${pkg}@${PKG_VERSION} not found on registry after 60s" > "${RESULTS_DIR}/${SAFE_NAME}.err"
                exit 1
              fi
              MISMATCH=$(echo "$META" | jq -r --arg v "$PKG_VERSION" '
                (.dependencies // {}) | to_entries[]
                | select(.key | startswith("nebula-ai-"))
                | select(.value != $v)
                | "\(.key)=\(.value)"
              ')
              if [ -n "$MISMATCH" ]; then
                {
                  echo "::error::${pkg}@${PKG_VERSION} has stale nebula-ai-* deps (expected ${PKG_VERSION}):"
                  echo "$MISMATCH" | sed 's/^/  /'
                } > "${RESULTS_DIR}/${SAFE_NAME}.err"
                exit 1
              fi
              echo "ok ${pkg}@${PKG_VERSION}" > "${RESULTS_DIR}/${SAFE_NAME}.ok"
            ) &
          done
          wait
          if ls "${RESULTS_DIR}"/*.err >/dev/null 2>&1; then
            cat "${RESULTS_DIR}"/*.err >&2
            echo "::error::Published metadata is broken. Bump to next patch and republish — npm is publish-once." >&2
            exit 1
          fi
          cat "${RESULTS_DIR}"/*.ok
          echo "All published packages have correct sibling deps pinned at ${PKG_VERSION}."

      # Smoke test: install the just-published CLI from npm into a fresh dir and
      # verify the nebula bin resolves at the right version. Bun caches the
      # packument fetched during `Install deps` (predating the publish steps),
      # so bust the cache before each attempt to avoid "no version matching".
      - name: Smoke test installed CLI
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          for attempt in 1 2 3; do
            rm -rf "$HOME/.bun/install/cache/nebula-treasury" "$HOME/.bun/install/cache/nebula-ai-core"
            if bun add -g "nebula-treasury@${PKG_VERSION}"; then
              break
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "::warning::install attempt $attempt failed (likely bun packument cache); cleared cache, sleeping 15s"
              sleep 15
            else
              echo "::error::install failed after 3 attempts at ${PKG_VERSION}"
              exit 1
            fi
          done
          export PATH="$HOME/.bun/bin:$HOME/.bun/install/global/node_modules/.bin:$PATH"
          if ! command -v nebula >/dev/null 2>&1; then
            echo "::error::nebula bin not found on PATH after global install"
            ls -la "$HOME/.bun/bin" || true
            exit 1
          fi
          echo "  ✓ nebula → $(command -v nebula)"
          CLI_JSON="$HOME/.bun/install/global/node_modules/nebula-treasury/package.json"
          INSTALLED_VERSION=$(node -p "require('$CLI_JSON').version")
          if [ "$INSTALLED_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::nebula-treasury@${INSTALLED_VERSION} does not match expected ${PKG_VERSION}"
            exit 1
          fi
          echo "Smoke test passed: nebula-treasury@${INSTALLED_VERSION} installed + bin resolves."

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --generate-notes --title "$TAG"
