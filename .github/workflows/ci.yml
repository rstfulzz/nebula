name: ci

on:
  push:
    branches: [dev]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: lint · typecheck · test
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.7

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

  contracts:
    name: contracts (odra)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5

      # The contracts pin a nightly toolchain via contracts/rust-toolchain.toml;
      # rustup installs it on the first cargo invocation.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts

      - name: OdraVM unit tests
        working-directory: contracts
        run: cargo test

  web:
    name: web build
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      # apps/web has no workspace deps, so install it in isolation from the bun
      # workspace root (plain npm rejects the workspace `overrides` otherwise).
      # apps/web/.npmrc sets legacy-peer-deps (CSPR.click UI's React-18 peer range).
      - name: Install web deps (isolated)
        working-directory: apps/web
        run: |
          mv "$GITHUB_WORKSPACE/package.json" "$GITHUB_WORKSPACE/package.json.ci"
          npm install --no-audit --no-fund
          mv "$GITHUB_WORKSPACE/package.json.ci" "$GITHUB_WORKSPACE/package.json"

      - name: Build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_CSPR_CLICK_APP_ID: ci-build-placeholder
        run: ./node_modules/.bin/next build
